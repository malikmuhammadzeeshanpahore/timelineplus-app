<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet - TimelinePlus</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
        }

        img {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px;
            color: #1a1a1a;
        }

        p {
            color: #666;
            margin: 0 0 30px;
            line-height: 1.5;
        }

        button {
            background: #0F172A;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Assuming logo exists at /logos/logo.svg based on favicon path -->
        <img src="/logos/logo.svg" alt="TimelinePlus Logo">
        <h1>No Internet Connection</h1>
        <p>It seems you are offline. Please checks your internet connection and try again.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>

</html>
