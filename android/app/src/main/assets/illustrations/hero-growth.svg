<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9933;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Elements -->
  <circle cx="200" cy="200" r="150" fill="#FFF5E5" opacity="0.5"/>
  <circle cx="200" cy="200" r="100" fill="#FFF0D0" opacity="0.5"/>

  <!-- Mobile Phone Shape -->
  <rect x="120" y="80" width="160" height="280" rx="20" fill="white" stroke="#18181b" stroke-width="4" filter="url(#shadow)"/>
  <rect x="135" y="100" width="130" height="200" rx="4" fill="#FAFAFA"/>
  
  <!-- Graph Line (Growth) -->
  <path d="M135 280 L170 240 L200 260 L240 180 L265 140" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" fill="none"/>
  
  <!-- Floating Elements (Likes, Hearts) -->
  <circle cx="265" cy="140" r="6" fill="#FF6600"/>
  <rect x="230" y="120" width="50" height="25" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>
  <text x="255" y="137" font-family="Arial" font-size="12" font-weight="bold" fill="#18181b" text-anchor="middle">+500%</text>

  <!-- Person/User Icon -->
  <circle cx="80" cy="150" r="25" fill="#18181b"/>
  <circle cx="320" cy="250" r="20" fill="#FF6600" opacity="0.8"/>
  <circle cx="60" cy="300" r="15" fill="#18181b" opacity="0.6"/>

</svg>
