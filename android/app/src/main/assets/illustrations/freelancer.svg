<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Laptop -->
  <rect x="50" y="50" width="240" height="150" rx="8" fill="#18181b" filter="url(#shadow2)"/>
  <rect x="60" y="60" width="220" height="130" rx="4" fill="#27272a"/>
  
  <!-- Screen Content (Task List) -->
  <rect x="75" y="80" width="100" height="10" rx="2" fill="#3f3f46"/>
  <rect x="75" y="100" width="180" height="10" rx="2" fill="#3f3f46" opacity="0.5"/>
  <rect x="75" y="120" width="180" height="10" rx="2" fill="#3f3f46" opacity="0.5"/>
  <rect x="75" y="140" width="140" height="10" rx="2" fill="#3f3f46" opacity="0.5"/>

  <!-- Earnings Card Floating -->
  <rect x="220" y="120" width="140" height="80" rx="8" fill="#fff" stroke="#18181b" stroke-width="2" transform="rotate(-5)" filter="url(#shadow2)"/>
  <text x="290" y="150" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Earnings</text>
  <text x="290" y="180" font-family="Arial" font-size="24" font-weight="bold" fill="#10B981" text-anchor="middle">PKR 5k</text>
  
  <!-- Coins -->
  <circle cx="340" cy="80" r="15" fill="#F59E0B"/>
  <text x="340" y="85" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">$</text>
  
</svg>
